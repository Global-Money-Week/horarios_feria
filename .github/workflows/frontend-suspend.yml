name: Frontend - Suspender Servicio

on:
  schedule:
    # Apagar frontend a las 11:00 PM hora Ecuador (04:00 UTC del día siguiente)
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  suspend-frontend:
    name: Suspender Frontend en Render
    runs-on: ubuntu-latest
    
    steps:
      - name: Validar configuración
        run: |
          echo "🔍 Validando variables de entorno..."
          if [ -z "${{ secrets.FRONTEND_SERVICE_ID }}" ]; then
            echo "❌ ERROR: FRONTEND_SERVICE_ID no está configurado"
            exit 1
          fi
          if [ -z "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "❌ ERROR: RENDER_API_KEY no está configurado"
            exit 1
          fi
          echo "✅ Variables configuradas correctamente"

      - name: Suspender frontend en Render
        run: |
          echo "🌙 Iniciando suspensión del frontend..."
          echo "⏰ Hora: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📍 Horario Ecuador: 11:00 PM"
          echo "🔑 Service ID: ${{ secrets.FRONTEND_SERVICE_ID }}"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.FRONTEND_SERVICE_ID }}/suspend" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "📊 Código HTTP: $HTTP_CODE"
          echo "📄 Respuesta completa: $BODY"
          
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 202 ]; then
            echo "✅ Frontend suspendido exitosamente"
            echo "⏳ Esperando 5 segundos..."
            sleep 5
          else
            echo "❌ Error al suspender el frontend"
            exit 1
          fi

      - name: Verificar estado del servicio
        run: |
          echo "🔍 Verificando estado del frontend..."
          
          STATUS_RESPONSE=$(curl -s \
            "https://api.render.com/v1/services/${{ secrets.FRONTEND_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json")
          
          echo "📄 Estado del servicio: $STATUS_RESPONSE"
          
          if command -v jq &> /dev/null; then
            SERVICE_STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.suspended // "unknown"')
            echo "🔍 Suspended: $SERVICE_STATUS"
          fi

      - name: Registro de suspensión
        run: |
          echo "📝 Resumen de la operación:"
          echo "   - Servicio: FRONTEND"
          echo "   - Acción: SUSPEND"
          echo "   - Estado: COMPLETADO"
          echo "   - Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
